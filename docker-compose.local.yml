services:
  app:
    image: webdevops/php-nginx:8.2
    container_name: mymakan_app_local
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./:/app
    ports:
      - "8080:80"
    environment:
      WEB_DOCUMENT_ROOT: /app/public
      PHP_DISPLAY_ERRORS: 0
      PHP_MEMORY_LIMIT: 512M
      PHP_POST_MAX_SIZE: 64M
      PHP_UPLOAD_MAX_FILESIZE: 64M
    depends_on:
      - db
    networks:
      - mymakan_net

  db:
    image: mysql:8.0
    container_name: mymakan_db_local
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: mymakan
      MYSQL_USER: mymakan_user
      MYSQL_PASSWORD: "dbpassword$$$$%%"
      MYSQL_ROOT_PASSWORD: "dbroot$$$$%%"
    volumes:
      - mymakan_db_data:/var/lib/mysql
    networks:
      - mymakan_net

volumes:
  mymakan_db_data:

networks:
  mymakan_net:
    driver: bridge
